<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Lina Art Studio</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-login">
    <div class="login-container">
        <div class="login-header">
            <h1>Lina Art Studio</h1>
            <p>Admin Portal</p>
        </div>
        
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-button">Login</button>
        </form>
        
        <div id="errorMessage" class="error-message"></div>
        <div class="forgot-password" style="margin-top: 1rem; text-align: center;">
            <a href="#" id="forgotPasswordLink" style="color: var(--black); font-size: 0.85rem;">Forgot Password?</a>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
