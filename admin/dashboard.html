<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Lina Art Studio</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-dashboard">
    <nav class="admin-nav">
        <div class="nav-container">
            <a href="../index.html" class="logo">Lina</a>
            <span>Admin Dashboard</span>
            <button id="logoutButton" class="logout-button">Logout</button>
        </div>
    </nav>
    
    <main class="admin-main">
        <div class="dashboard-grid">
            <!-- Manage Artworks Section -->
            <section class="admin-section">
                <h2>Manage Artworks</h2>
                
                <div class="add-artwork-form">
                    <h3>Add New Artwork</h3>
                    <form id="addArtworkForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="artworkTitle">Title</label>
                                <input type="text" id="artworkTitle" required>
                            </div>
                            <div class="form-group">
                                <label for="artworkPrice">Price ($)</label>
                                <input type="number" id="artworkPrice" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="artworkMedium">Medium</label>
                                <input type="text" id="artworkMedium" required>
                            </div>
                            <div class="form-group">
                                <label for="artworkSize">Size</label>
                                <input type="text" id="artworkSize" placeholder="80 × 100 cm">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="artworkImage">Image URL</label>
                            <input type="text" id="artworkImage" placeholder="images/artworks/filename.jpg" required>
                            <small class="help-text">Relative path from website root</small>
                        </div>
                        
                        <div class="form-group">
                            <label for="artworkDescription">Description</label>
                            <textarea id="artworkDescription" rows="3"></textarea>
                        </div>
                        
                        <button type="submit" class="save-button">Add Artwork</button>
                    </form>
                </div>
                
                <!-- Existing Artworks -->
                <div class="artworks-list">
                    <h3>Existing Artworks</h3>
                    <div id="artworksContainer" class="artworks-grid">
                        <!-- Dynamically loaded -->
                    </div>
                </div>
            </section>
            
            <!-- Artist Info Section -->
            <section class="admin-section">
                <h2>Artist Information</h2>
                <form id="artistForm">
                    <div class="form-group">
                        <label for="artistName">Artist Name</label>
                        <input type="text" id="artistName" value="Lina">
                    </div>
                    
                    <div class="form-group">
                        <label for="artistBio">Bio</label>
                        <textarea id="artistBio" rows="4">Independent artist exploring the intersection of contemporary femininity, minimalist abstraction, and emotional depth.</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="artistImage">Portrait Image URL</label>
                        <input type="text" id="artistImage" value="images/artist/lina-portrait.jpg">
                    </div>
                    
                    <button type="submit" class="save-button">Update Artist Info</button>
                </form>
            </section>
        </div>
    </main>
    
    <script src="admin.js"></script>
</body>
</html>
